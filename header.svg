<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" width="920" height="320" role="img" aria-label="VectorMail — Inbox, indexed.">
  <rect width="920" height="320" fill="#0a0a0c"/>
  <rect x="0.5" y="0.5" width="919" height="319" fill="none" stroke="#1f1f23" stroke-width="1"/>

  <!-- top rule -->
  <line x1="42" y1="58" x2="878" y2="58" stroke="#27272a" stroke-width="1"/>

  <!-- masthead -->
  <text x="42" y="38" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="700" letter-spacing="3.8" fill="#fafafa">VECTORMAIL</text>
  <text x="878" y="38" text-anchor="end" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" font-weight="500" letter-spacing="3" fill="#71717a">EST. 2026</text>

  <!-- hero: stacked two-word statement, left-aligned -->
  <text x="42" y="160" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="96" font-weight="800" letter-spacing="-4.5" fill="#fafafa">Inbox,</text>
  <text x="42" y="245" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="96" font-weight="800" letter-spacing="-4.5" fill="#fafafa">indexed.</text>

  <!-- descriptor: three user-action lines, each pointed at a real endpoint -->
  <text x="540" y="148" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="15" font-weight="400" fill="#d4d4d8">
    <tspan x="540" dy="0">Find emails by what they mean.</tspan>
    <tspan x="540" dy="24">Read a brief, not your inbox.</tspan>
    <tspan x="540" dy="24">Reply faster than you can type.</tspan>
  </text>

  <!-- bottom rule -->
  <line x1="42" y1="276" x2="878" y2="276" stroke="#27272a" stroke-width="1"/>

  <!-- bottom strip -->
  <text x="42" y="300" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" letter-spacing="2.6" fill="#71717a">SEMANTIC SEARCH   ·   AI DRAFTS   ·   DAILY BRIEFS</text>
  <text x="878" y="300" text-anchor="end" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="10" font-weight="600" letter-spacing="2.6" fill="#71717a">RELEASE 1.0</text>
</svg>
